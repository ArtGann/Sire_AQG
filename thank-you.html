<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank You | All Quality Gutters LLC</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="stylesheet" href="assets/css/styles.css?v=20260703-homepage-redesign" />
    <style>
      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          linear-gradient(90deg, rgba(5, 12, 14, 0.96), rgba(5, 12, 14, 0.78)),
          url("assets/img/hero-bg-source-match.webp") center / cover no-repeat;
      }

      .thanks {
        width: min(620px, calc(100% - 32px));
        background: #fff;
        border-radius: 12px;
        box-shadow: var(--shadow);
        padding: 42px;
        text-align: center;
      }

      .thanks img {
        width: 240px;
        margin: 0 auto 24px;
      }

      .thanks h1 {
        color: var(--ink);
        font-size: 42px;
        line-height: 1.05;
        margin-bottom: 14px;
      }

      .thanks p {
        color: var(--soft-ink);
        font-size: 18px;
        margin-bottom: 24px;
      }

      .thanks__actions {
        display: flex;
        justify-content: center;
        gap: 12px;
        flex-wrap: wrap;
      }
    </style>
  </head>
  <body>
    <main class="thanks">
      <img src="assets/img/logo-site.webp" width="480" height="188" alt="All Quality Gutters LLC" />
      <h1>Thank You!</h1>
      <p>Your estimate request has been received. Our team will contact you shortly with honest next steps.</p>
      <div class="thanks__actions">
        <a class="btn btn--primary" href="/">Back to Home</a>
        <a class="btn btn--outline" href="tel:+18445880075" style="color: var(--accent-dark); border-color: var(--accent)">Call Now</a>
      </div>
    </main>
  </body>
</html>
