  <text class="title" x="460" y="45" text-anchor="middle">Service Coverage Area</text>
  <text class="state" x="92" y="98">Pennsylvania</text>
  <text class="state" x="570" y="98">New Jersey</text>
  <text class="river" x="431" y="128" transform="rotate(66 431 128)">Delaware River</text>

  <ellipse cx="459" cy="205" rx="285" ry="94" fill="#4d963c" opacity=".16"/>
  <ellipse cx="459" cy="205" rx="210" ry="64" fill="#4d963c" opacity=".17"/>

