<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 340" role="img" aria-label="Readable service area map for Philadelphia, Bensalem, Camden, Cherry Hill, Lawnside, and Trenton">
  <defs>
    <filter id="soft-shadow" x="-20%" y="-30%" width="140%" height="170%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#17221a" flood-opacity=".16"/>
    </filter>
    <linearGradient id="river-fill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#cbe5ef"/>
      <stop offset="1" stop-color="#8fb9c8"/>
    </linearGradient>
    <style>
      .title{font-family:Arial,Helvetica,sans-serif;font-size:27px;font-weight:800;fill:#17221a}
      .state{font-family:Arial,Helvetica,sans-serif;font-size:24px;font-weight:800;fill:#17221a}
      .city{font-family:Arial,Helvetica,sans-serif;font-size:20px;font-weight:800;fill:#17221a}
      .note{font-family:Arial,Helvetica,sans-serif;font-size:14px;font-weight:700;fill:#536057}
      .river{font-family:Arial,Helvetica,sans-serif;font-size:13px;font-weight:700;fill:#5d7f8b}
    </style>
  </defs>

  <rect width="920" height="340" rx="18" fill="#f4f6f2"/>
  <rect x="24" y="22" width="872" height="296" rx="18" fill="#fff" filter="url(#soft-shadow)"/>

  <path d="M44 62h350v216H44Z" fill="#f4efe3"/>
